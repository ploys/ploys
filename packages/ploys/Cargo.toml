[package]
name = "ploys"
version = "0.6.0"
description = "A utility to manage projects, packages, releases and deployments."
authors = ["Daniel Balcomb <daniel.balcomb@gmail.com>"]
homepage = "https://ploys.dev"
repository = "https://github.com/ploys/ploys"
license = "MIT OR Apache-2.0"
edition = "2024"

[features]
default = ["fs", "git"]
fs = ["dep:walkdir"]
git = ["dep:gix"]

[dependencies]
base64 = "0.22.1"
bytes = "1.10.1"
dialoguer = "0.11.0"
either = "1.13.0"
gix = { version = "0.83.0", features = ["tree-editor"], optional = true }
globset = "0.4.13"
itertools = "0.14.0"
keyring-core = "1.0.0"
markdown = "1.0.0"
once_cell = "1.20.2"
once_map = "0.4.22"
relative-path = { version = "2.0.1", features = ["serde"] }
reqwest = { version = "0.13.3", features = ["blocking", "form", "json", "query"] }
semver = "1.0.19"
serde = { version = "1.0.185", features = ["derive"] }
serde_json = "1.0.149"
serde_with = "3.17.0"
strum = { version = "0.26.3", features = ["derive"] }
time = { version = "0.3.36", features = ["serde", "formatting", "parsing"] }
toml_edit = { version = "0.22.14", features = ["serde"] }
tracing = "0.1.41"
url = { version = "2.4.0", features = ["serde"] }
walkdir = { version = "2.5.0", optional = true }

[dev-dependencies]
indoc = "2.0.5"
pretty_assertions = "1.4.1"
serde_json = "1.0.149"
tempfile = "3.15.0"
