[package]
name = "ploys-cli"
version = "0.5.0"
description = "A command line application to manage projects, packages, releases and deployments."
authors = ["Daniel Balcomb <daniel.balcomb@gmail.com>"]
homepage = "https://ploys.dev"
repository = "https://github.com/ploys/ploys"
license = "MIT OR Apache-2.0"
edition = "2024"

[dependencies]
anyhow = "1.0.72"
clap = { version = "4.3.21", features = ["derive", "env"] }
console = "0.15.7"
dialoguer = "0.11.0"
itertools = "0.14.0"
keyring-core = "1.0.0"
ploys = { version = "0.6.0", path = "../ploys" }
semver = "1.0.19"
strum = { version = "0.26.3", features = ["derive"] }
time = { version = "0.3.36", features = ["formatting"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
url = "2.4.0"

[dependencies.clap-verbosity-flag]
version = "3.0.2"
features = ["tracing"]
default-features = false

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { version = "1.0.0", features = ["keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-native-keyring-store = "1.0.0"

[target.'cfg(target_os = "linux")'.dependencies]
dbus-secret-service-keyring-store = { version = "1.0.0", features = ["crypto-rust", "vendored"] }

[dev-dependencies]
assert_cmd = "2.0.12"
predicates = { version = "3.0.3", features = ["regex"] }
tempfile = "3.15.0"

[[bin]]
name = "ploys"
path = "src/main.rs"
